# More information about the configuration file can be found here:
# https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/serverless-sam-cli-config.html
version = 0.1

[default.global.parameters]
stack_name = "e2open-freight-bidder"

[default.build.parameters]
cached = true
parallel = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
region = "us-east-1"
# LIVE: a confirmed 'yes' reply places a REAL bid. Set to DryRun=true to disarm.
# IntakeRecipient/MailFrom are pinned explicitly because CloudFormation reuses
# a parameter's previously-deployed value when it's omitted here, even after
# the template's Default changes — omitting them would silently keep the
# stack on the old bids.carolinascourier.com addresses.
parameter_overrides = "DryRun=false IntakeRecipient=bid@bot.carolinascourier.com MailFrom=auto@bot.carolinascourier.com SharedRuleSetName=ccs-bot-rules"

[default.package.parameters]
resolve_s3 = true

[default.sync.parameters]
watch = true

[default.local_start_api.parameters]
warm_containers = "EAGER"

[default.local_start_lambda.parameters]
warm_containers = "EAGER"
